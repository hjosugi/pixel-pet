<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Pet</title>
  </head>
  <body>
    <div id="app" aria-label="Pixel Pet desktop companion">
      <div id="drag-region" data-tauri-drag-region title="Drag the window"></div>
      <button id="focus-toggle" type="button" aria-pressed="false" title="Low-distraction mode">quiet</button>
      <button id="ball-toggle" type="button" aria-pressed="false" title="Ball game">ball</button>
      <button id="settings-toggle" type="button" aria-expanded="false" title="Settings">set</button>
      <div id="focus-panel" aria-label="Focus timer">
        <button id="focus-timer-toggle" type="button" aria-pressed="false" title="Focus timer">focus</button>
        <select id="focus-interval" aria-label="Rest reminder interval" title="Rest reminder interval"></select>
        <span id="focus-clock">00:00</span>
      </div>
      <div id="settings-panel" aria-label="Pet settings" hidden>
        <label class="settings-check">
          <input id="pet-visible-toggle" type="checkbox" />
          <span>pet</span>
        </label>
        <label class="settings-check">
          <input id="always-on-top-toggle" type="checkbox" />
          <span>top</span>
        </label>
        <label class="settings-check disabled" title="Autostart needs a desktop autostart plugin before it can be enabled">
          <input id="autostart-toggle" type="checkbox" disabled />
          <span>start</span>
        </label>
        <label class="settings-field">
          <span>talk</span>
          <select id="talk-frequency" aria-label="Talk frequency"></select>
        </label>
        <label class="settings-field">
          <span>move</span>
          <select id="motion-level" aria-label="Motion level"></select>
        </label>
        <button id="update-check" class="settings-action" type="button" title="Check for app updates">upd</button>
      </div>
      <canvas id="pet-canvas" width="320" height="220" aria-label="Cyber pixel pet"></canvas>
      <div id="speech" aria-live="polite"></div>
      <form id="chat-panel" aria-label="Talk to pet">
        <select id="ai-provider" aria-label="AI provider" title="AI provider"></select>
        <input id="chat-input" type="text" maxlength="120" autocomplete="off" aria-label="Talk message" placeholder="talk" />
        <button id="chat-send" type="submit" title="Send message">send</button>
      </form>
      <div id="pet-selector" aria-label="Choose pet"></div>
      <div id="capsule-panel" aria-label="Pet capsule">
        <button id="capsule-export" type="button" title="Export pet capsule">export</button>
        <button id="capsule-import" type="button" title="Import pet capsule">import</button>
        <input id="capsule-file" type="file" accept="application/json,.json" hidden />
      </div>
      <div id="status-panel">
        <span id="mood-dot"></span>
        <span id="state-label">booting</span>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
